name: Build VeilPix Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'components/**'
      - 'App.tsx'
      - 'index.css'
      - 'index.tsx'
      - 'types.ts'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      env:
        VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        VITE_API_BASE_URL: https://api.veilstudio.io

    - name: Trigger VeilStudio Cloudflare Pages deployment
      if: github.event_name == 'push'
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.VEILSTUDIO_DISPATCH_TOKEN }}
        repository: rcwells1879/VeilStudio
        event-type: veilpix-updated
        client-payload: '{"source_repo":"veilpix","source_sha":"${{ github.sha }}","source_ref":"${{ github.ref_name }}"}'
